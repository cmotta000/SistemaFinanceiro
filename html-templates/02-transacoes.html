<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template 02 — Transações</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background-color: #f8fafc; }
    .badge-receita { background-color: #dcfce7; color: #15803d; }
    .badge-despesa { background-color: #fee2e2; color: #b91c1c; }
    tr:hover { background-color: #f1f5f9; }
  </style>
</head>
<body class="p-4">

  <div class="container-xl">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="fs-4 fw-bold mb-0">📋 Transações</h1>
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalTransacao" onclick="abrirNova()">
        + Nova Transação
      </button>
    </div>

    <!-- Filtros -->
    <div class="d-flex gap-2 mb-3">
      <input type="text" id="busca" class="form-control" placeholder="Buscar transação..." oninput="filtrar()" style="max-width:280px" />
      <select id="filtroTipo" class="form-select" onchange="filtrar()" style="max-width:160px">
        <option value="">Todos</option>
        <option value="receita">Receitas</option>
        <option value="despesa">Despesas</option>
      </select>
    </div>

    <!-- Tabela READ -->
    <div class="card shadow-sm">
      <div class="card-body p-0">
        <table class="table table-striped mb-0" id="tabelaTransacoes">
          <thead class="table-light">
            <tr>
              <th>Descrição</th>
              <th>Tipo</th>
              <th>Valor</th>
              <th>Data</th>
              <th>Categoria</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabela"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- MODAL — Criar / Editar Transação -->
  <div class="modal fade" id="modalTransacao" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModal">Nova Transação</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- FORMULÁRIO CREATE / UPDATE -->
        <form id="formTransacao" novalidate>
          <div class="modal-body">

            <!-- Descrição -->
            <div class="mb-3">
              <label for="descricao" class="form-label fw-semibold">Descrição <span class="text-danger">*</span></label>
              <input type="text" id="descricao" class="form-control" placeholder="Ex: Supermercado" required />
            </div>

            <!-- Tipo (radio) -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Tipo <span class="text-danger">*</span></label>
              <div class="d-flex gap-3">
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="tipo" id="tipoReceita" value="receita" />
                  <label class="form-check-label text-success fw-semibold" for="tipoReceita">Receita</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input" type="radio" name="tipo" id="tipoDespesa" value="despesa" checked />
                  <label class="form-check-label text-danger fw-semibold" for="tipoDespesa">Despesa</label>
                </div>
              </div>
            </div>

            <!-- Valor -->
            <div class="mb-3">
              <label for="valor" class="form-label fw-semibold">Valor (R$) <span class="text-danger">*</span></label>
              <input type="number" id="valor" class="form-control" placeholder="0,00" min="0.01" step="0.01" required />
            </div>

            <!-- Data -->
            <div class="mb-3">
              <label for="data" class="form-label fw-semibold">Data <span class="text-danger">*</span></label>
              <input type="date" id="data" class="form-control" required />
            </div>

            <!-- Categoria (select) -->
            <div class="mb-3">
              <label for="categoria" class="form-label fw-semibold">Categoria</label>
              <select id="categoria" class="form-select">
                <option value="">Selecione...</option>
                <option value="Alimentação">🍔 Alimentação</option>
                <option value="Transporte">🚗 Transporte</option>
                <option value="Moradia">🏠 Moradia</option>
                <option value="Saúde">💊 Saúde</option>
                <option value="Lazer">🎮 Lazer</option>
                <option value="Salário">💼 Salário</option>
                <option value="Outros">📦 Outros</option>
              </select>
            </div>

          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-success" id="btnSalvar">Adicionar</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- MODAL — Confirmação de Exclusão -->
  <div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-danger">Excluir Transação</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Tem certeza que deseja excluir esta transação?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btnConfirmarExcluir">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ── Estado em memória ──────────────────────────────────────────────
    let transacoes = [
      { id: 1, descricao: 'Salário', tipo: 'receita', valor: 3500, data: '2025-06-01', categoria: 'Salário' },
      { id: 2, descricao: 'Supermercado', tipo: 'despesa', valor: 320, data: '2025-06-05', categoria: 'Alimentação' },
      { id: 3, descricao: 'Conta de luz', tipo: 'despesa', valor: 180, data: '2025-06-10', categoria: 'Moradia' },
    ];
    let proximoId = 4;
    let editandoId = null;
    let excluindoId = null;

    // ── Renderização ───────────────────────────────────────────────────
    function renderizar(lista) {
      lista = lista || transacoes;
      const corpo = document.getElementById('corpoTabela');
      corpo.innerHTML = lista.map(t => `
        <tr>
          <td>${t.descricao}</td>
          <td><span class="badge ${t.tipo === 'receita' ? 'badge-receita' : 'badge-despesa'} px-2 py-1 rounded-pill">${t.tipo}</span></td>
          <td class="${t.tipo === 'receita' ? 'text-success' : 'text-danger'} fw-semibold">
            ${t.tipo === 'receita' ? '+' : '-'} R$ ${t.valor.toFixed(2)}
          </td>
          <td>${t.data}</td>
          <td>${t.categoria || '—'}</td>
          <td>
            <button class="btn btn-sm btn-warning me-1" onclick="abrirEditar(${t.id})">Editar</button>
            <button class="btn btn-sm btn-danger" onclick="confirmarExcluir(${t.id})">Excluir</button>
          </td>
        </tr>
      `).join('');
    }

    function filtrar() {
      const busca = document.getElementById('busca').value.toLowerCase();
      const tipo = document.getElementById('filtroTipo').value;
      renderizar(transacoes.filter(t =>
        t.descricao.toLowerCase().includes(busca) &&
        (tipo === '' || t.tipo === tipo)
      ));
    }

    // ── CREATE ─────────────────────────────────────────────────────────
    function abrirNova() {
      editandoId = null;
      document.getElementById('tituloModal').textContent = 'Nova Transação';
      document.getElementById('btnSalvar').textContent = 'Adicionar';
      document.getElementById('formTransacao').reset();
      document.getElementById('data').value = new Date().toISOString().split('T')[0];
    }

    // ── UPDATE ─────────────────────────────────────────────────────────
    function abrirEditar(id) {
      editandoId = id;
      const t = transacoes.find(x => x.id === id);
      document.getElementById('tituloModal').textContent = 'Editar Transação';
      document.getElementById('btnSalvar').textContent = 'Salvar Alterações';
      document.getElementById('descricao').value = t.descricao;
      document.getElementById('valor').value = t.valor;
      document.getElementById('data').value = t.data;
      document.getElementById('categoria').value = t.categoria;
      document.querySelector(`input[name="tipo"][value="${t.tipo}"]`).checked = true;
      new bootstrap.Modal(document.getElementById('modalTransacao')).show();
    }

    document.getElementById('formTransacao').addEventListener('submit', function (e) {
      e.preventDefault();
      const dados = {
        descricao: document.getElementById('descricao').value.trim(),
        tipo: document.querySelector('input[name="tipo"]:checked').value,
        valor: parseFloat(document.getElementById('valor').value),
        data: document.getElementById('data').value,
        categoria: document.getElementById('categoria').value,
      };
      if (!dados.descricao || !dados.valor || !dados.data) return;

      if (editandoId === null) {
        transacoes.push({ id: proximoId++, ...dados });
      } else {
        const idx = transacoes.findIndex(t => t.id === editandoId);
        transacoes[idx] = { id: editandoId, ...dados };
      }
      bootstrap.Modal.getInstance(document.getElementById('modalTransacao')).hide();
      renderizar();
    });

    // ── DELETE ─────────────────────────────────────────────────────────
    function confirmarExcluir(id) {
      excluindoId = id;
      new bootstrap.Modal(document.getElementById('modalExcluir')).show();
    }

    document.getElementById('btnConfirmarExcluir').addEventListener('click', function () {
      transacoes = transacoes.filter(t => t.id !== excluindoId);
      bootstrap.Modal.getInstance(document.getElementById('modalExcluir')).hide();
      renderizar();
    });

    // ── Init ───────────────────────────────────────────────────────────
    renderizar();
  </script>

</body>
</html>
