<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template 04 — Orçamentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background-color: #f8fafc; }
    .progress { height: 10px; border-radius: 8px; }
    .card-orcamento { border-top: 3px solid #f59e0b; }
  </style>
</head>
<body class="p-4">

  <div class="container-xl">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="fs-4 fw-bold mb-0">🎯 Orçamentos</h1>
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalOrcamento" onclick="abrirNovo()">
        + Novo Orçamento
      </button>
    </div>

    <!-- READ — Cards de orçamento -->
    <div class="row g-3" id="listaOrcamentos"></div>
  </div>

  <!-- MODAL — Criar / Editar Orçamento -->
  <div class="modal fade" id="modalOrcamento" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModal">Novo Orçamento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- FORMULÁRIO -->
        <form id="formOrcamento" novalidate>
          <div class="modal-body">

            <!-- Categoria (select) -->
            <div class="mb-3">
              <label for="categoria" class="form-label fw-semibold">Categoria <span class="text-danger">*</span></label>
              <select id="categoria" class="form-select" required>
                <option value="">Selecione...</option>
                <option value="Alimentação">🍔 Alimentação</option>
                <option value="Transporte">🚗 Transporte</option>
                <option value="Moradia">🏠 Moradia</option>
                <option value="Saúde">💊 Saúde</option>
                <option value="Lazer">🎮 Lazer</option>
                <option value="Outros">📦 Outros</option>
              </select>
            </div>

            <!-- Valor Limite -->
            <div class="mb-3">
              <label for="valorLimite" class="form-label fw-semibold">Valor Limite (R$) <span class="text-danger">*</span></label>
              <input type="number" id="valorLimite" class="form-control" placeholder="Ex: 500,00" min="1" step="0.01" required />
            </div>

            <!-- Mês de referência (input month) -->
            <div class="mb-3">
              <label for="mesReferencia" class="form-label fw-semibold">Mês de Referência <span class="text-danger">*</span></label>
              <input type="month" id="mesReferencia" class="form-control" required />
            </div>

          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-success" id="btnSalvar">Adicionar</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- MODAL — Confirmação de Exclusão -->
  <div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-danger">Excluir Orçamento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Tem certeza que deseja excluir este orçamento?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btnConfirmarExcluir">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let orcamentos = [
      { id: 1, categoria: 'Alimentação', valorLimite: 600, gastoAtual: 320, mesReferencia: '2025-06' },
      { id: 2, categoria: 'Transporte', valorLimite: 200, gastoAtual: 210, mesReferencia: '2025-06' },
      { id: 3, categoria: 'Lazer', valorLimite: 300, gastoAtual: 80, mesReferencia: '2025-06' },
    ];
    let proximoId = 4;
    let editandoId = null;
    let excluindoId = null;

    function calcularPorcentagem(gasto, limite) {
      return Math.min(100, Math.round((gasto / limite) * 100));
    }

    function corBarra(pct) {
      if (pct >= 100) return 'bg-danger';
      if (pct >= 80) return 'bg-warning';
      return 'bg-success';
    }

    function renderizar() {
      document.getElementById('listaOrcamentos').innerHTML = orcamentos.map(o => {
        const pct = calcularPorcentagem(o.gastoAtual, o.valorLimite);
        const restante = o.valorLimite - o.gastoAtual;
        return `
          <div class="col-md-4">
            <div class="card card-orcamento h-100">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <div>
                    <h6 class="fw-bold mb-0">${o.categoria}</h6>
                    <small class="text-muted">${o.mesReferencia}</small>
                  </div>
                  <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-warning" onclick="abrirEditar(${o.id})">✏️</button>
                    <button class="btn btn-sm btn-danger" onclick="confirmarExcluir(${o.id})">🗑️</button>
                  </div>
                </div>
                <div class="progress mb-2">
                  <div class="progress-bar ${corBarra(pct)}" style="width:${pct}%"></div>
                </div>
                <div class="d-flex justify-content-between small">
                  <span class="text-muted">Gasto: <strong>R$ ${o.gastoAtual.toFixed(2)}</strong></span>
                  <span class="fw-semibold">${pct}%</span>
                </div>
                <div class="d-flex justify-content-between small mt-1">
                  <span class="text-muted">Limite: R$ ${o.valorLimite.toFixed(2)}</span>
                  <span class="${restante < 0 ? 'text-danger' : 'text-success'} fw-semibold">
                    ${restante < 0 ? '⚠️ Acima em R$ ' + Math.abs(restante).toFixed(2) : 'Disponível: R$ ' + restante.toFixed(2)}
                  </span>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('') || '<p class="text-muted">Nenhum orçamento cadastrado.</p>';
    }

    function abrirNovo() {
      editandoId = null;
      document.getElementById('tituloModal').textContent = 'Novo Orçamento';
      document.getElementById('btnSalvar').textContent = 'Adicionar';
      document.getElementById('formOrcamento').reset();
      document.getElementById('mesReferencia').value = new Date().toISOString().slice(0, 7);
    }

    function abrirEditar(id) {
      editandoId = id;
      const o = orcamentos.find(x => x.id === id);
      document.getElementById('tituloModal').textContent = 'Editar Orçamento';
      document.getElementById('btnSalvar').textContent = 'Salvar Alterações';
      document.getElementById('categoria').value = o.categoria;
      document.getElementById('valorLimite').value = o.valorLimite;
      document.getElementById('mesReferencia').value = o.mesReferencia;
      new bootstrap.Modal(document.getElementById('modalOrcamento')).show();
    }

    document.getElementById('formOrcamento').addEventListener('submit', function (e) {
      e.preventDefault();
      const dados = {
        categoria: document.getElementById('categoria').value,
        valorLimite: parseFloat(document.getElementById('valorLimite').value),
        mesReferencia: document.getElementById('mesReferencia').value,
      };
      if (!dados.categoria || !dados.valorLimite || !dados.mesReferencia) return;

      if (editandoId === null) {
        orcamentos.push({ id: proximoId++, gastoAtual: 0, ...dados });
      } else {
        const idx = orcamentos.findIndex(o => o.id === editandoId);
        orcamentos[idx] = { ...orcamentos[idx], ...dados };
      }
      bootstrap.Modal.getInstance(document.getElementById('modalOrcamento')).hide();
      renderizar();
    });

    function confirmarExcluir(id) {
      excluindoId = id;
      new bootstrap.Modal(document.getElementById('modalExcluir')).show();
    }

    document.getElementById('btnConfirmarExcluir').addEventListener('click', function () {
      orcamentos = orcamentos.filter(o => o.id !== excluindoId);
      bootstrap.Modal.getInstance(document.getElementById('modalExcluir')).hide();
      renderizar();
    });

    renderizar();
  </script>

</body>
</html>
