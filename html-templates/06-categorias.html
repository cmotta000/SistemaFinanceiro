<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template 06 — Categorias</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background-color: #f8fafc; }
    .card-categoria { cursor: default; transition: transform .15s; }
    .card-categoria:hover { transform: translateY(-2px); }
    .icone-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
    .icone-opcao { font-size: 1.4rem; border: 2px solid transparent; border-radius: 8px; padding: 4px; text-align: center; cursor: pointer; }
    .icone-opcao.selecionado { border-color: #16a34a; background: #f0fdf4; }
    .cor-opcao { width: 28px; height: 28px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; display: inline-block; }
    .cor-opcao.selecionada { border-color: #111; transform: scale(1.2); }
    .preview-badge { font-size: 1rem; padding: 6px 14px; border-radius: 999px; }
  </style>
</head>
<body class="p-4">

  <div class="container-xl">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="fs-4 fw-bold mb-0">🏷️ Categorias</h1>
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalCategoria" onclick="abrirNova()">
        + Nova Categoria
      </button>
    </div>

    <!-- READ -->
    <div class="row g-3" id="listaCategorias"></div>
  </div>

  <!-- MODAL — Criar / Editar Categoria -->
  <div class="modal fade" id="modalCategoria" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModal">Nova Categoria</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- FORMULÁRIO com seleção visual de ícone e cor -->
        <form id="formCategoria" novalidate>
          <div class="modal-body">

            <!-- Nome -->
            <div class="mb-3">
              <label for="nome" class="form-label fw-semibold">Nome <span class="text-danger">*</span></label>
              <input type="text" id="nome" class="form-control" placeholder="Ex: Alimentação" oninput="atualizarPreview()" required />
            </div>

            <!-- Seleção de Ícone (grid visual) -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Ícone</label>
              <div class="icone-grid" id="gradeIcones"></div>
              <input type="hidden" id="iconeSelecionado" value="📦" />
            </div>

            <!-- Seleção de Cor (bolinhas coloridas) -->
            <div class="mb-3">
              <label class="form-label fw-semibold">Cor</label>
              <div class="d-flex gap-2 flex-wrap" id="gradeCores"></div>
              <input type="hidden" id="corSelecionada" value="#16a34a" />
            </div>

            <!-- Preview da badge da categoria -->
            <div class="mb-2">
              <label class="form-label fw-semibold">Prévia</label><br />
              <span class="preview-badge text-white" id="previewBadge" style="background:#16a34a">📦 Categoria</span>
            </div>

          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-success" id="btnSalvar">Adicionar</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- MODAL — Confirmação de Exclusão -->
  <div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-danger">Excluir Categoria</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Tem certeza que deseja excluir esta categoria?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btnConfirmarExcluir">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const ICONES = ['🍔','🚗','🏠','💊','🎮','💼','📦','✈️','📚','🎵','🐶','☕','🛒','💡','👗','🏋️','🎁','🖥️','📱','🌿'];
    const CORES = ['#16a34a','#2563eb','#dc2626','#d97706','#7c3aed','#db2777','#0891b2','#65a30d','#ea580c','#6b7280'];

    let categorias = [
      { id: 1, nome: 'Alimentação', icone: '🍔', cor: '#d97706' },
      { id: 2, nome: 'Transporte', icone: '🚗', cor: '#2563eb' },
      { id: 3, nome: 'Moradia', icone: '🏠', cor: '#16a34a' },
      { id: 4, nome: 'Saúde', icone: '💊', cor: '#dc2626' },
      { id: 5, nome: 'Lazer', icone: '🎮', cor: '#7c3aed' },
    ];
    let proximoId = 6;
    let editandoId = null;
    let excluindoId = null;

    // Monta grade de ícones
    function montarGradeIcones(selecionado) {
      document.getElementById('gradeIcones').innerHTML = ICONES.map(i => `
        <div class="icone-opcao ${i === selecionado ? 'selecionado' : ''}" onclick="selecionarIcone('${i}')">${i}</div>
      `).join('');
    }

    // Monta grade de cores
    function montarGradeCores(selecionada) {
      document.getElementById('gradeCores').innerHTML = CORES.map(c => `
        <span class="cor-opcao ${c === selecionada ? 'selecionada' : ''}"
          style="background:${c}" onclick="selecionarCor('${c}')"></span>
      `).join('');
    }

    function selecionarIcone(icone) {
      document.getElementById('iconeSelecionado').value = icone;
      montarGradeIcones(icone);
      atualizarPreview();
    }

    function selecionarCor(cor) {
      document.getElementById('corSelecionada').value = cor;
      montarGradeCores(cor);
      atualizarPreview();
    }

    function atualizarPreview() {
      const nome = document.getElementById('nome').value || 'Categoria';
      const icone = document.getElementById('iconeSelecionado').value;
      const cor = document.getElementById('corSelecionada').value;
      const badge = document.getElementById('previewBadge');
      badge.textContent = `${icone} ${nome}`;
      badge.style.background = cor;
    }

    function renderizar() {
      document.getElementById('listaCategorias').innerHTML = categorias.map(c => `
        <div class="col-md-3 col-6">
          <div class="card card-categoria h-100 text-center p-3">
            <div style="font-size:2rem">${c.icone}</div>
            <span class="preview-badge text-white mt-2" style="background:${c.cor}">${c.nome}</span>
            <div class="d-flex justify-content-center gap-2 mt-3">
              <button class="btn btn-sm btn-warning" onclick="abrirEditar(${c.id})">✏️</button>
              <button class="btn btn-sm btn-danger" onclick="confirmarExcluir(${c.id})">🗑️</button>
            </div>
          </div>
        </div>
      `).join('') || '<p class="text-muted">Nenhuma categoria cadastrada.</p>';
    }

    function abrirNova() {
      editandoId = null;
      document.getElementById('tituloModal').textContent = 'Nova Categoria';
      document.getElementById('btnSalvar').textContent = 'Adicionar';
      document.getElementById('formCategoria').reset();
      document.getElementById('iconeSelecionado').value = '📦';
      document.getElementById('corSelecionada').value = '#16a34a';
      montarGradeIcones('📦');
      montarGradeCores('#16a34a');
      atualizarPreview();
    }

    function abrirEditar(id) {
      editandoId = id;
      const c = categorias.find(x => x.id === id);
      document.getElementById('tituloModal').textContent = 'Editar Categoria';
      document.getElementById('btnSalvar').textContent = 'Salvar Alterações';
      document.getElementById('nome').value = c.nome;
      document.getElementById('iconeSelecionado').value = c.icone;
      document.getElementById('corSelecionada').value = c.cor;
      montarGradeIcones(c.icone);
      montarGradeCores(c.cor);
      atualizarPreview();
      new bootstrap.Modal(document.getElementById('modalCategoria')).show();
    }

    document.getElementById('formCategoria').addEventListener('submit', function (e) {
      e.preventDefault();
      const dados = {
        nome: document.getElementById('nome').value.trim(),
        icone: document.getElementById('iconeSelecionado').value,
        cor: document.getElementById('corSelecionada').value,
      };
      if (!dados.nome) return;

      if (editandoId === null) {
        categorias.push({ id: proximoId++, ...dados });
      } else {
        const idx = categorias.findIndex(c => c.id === editandoId);
        categorias[idx] = { id: editandoId, ...dados };
      }
      bootstrap.Modal.getInstance(document.getElementById('modalCategoria')).hide();
      renderizar();
    });

    function confirmarExcluir(id) {
      excluindoId = id;
      new bootstrap.Modal(document.getElementById('modalExcluir')).show();
    }

    document.getElementById('btnConfirmarExcluir').addEventListener('click', function () {
      categorias = categorias.filter(c => c.id !== excluindoId);
      bootstrap.Modal.getInstance(document.getElementById('modalExcluir')).hide();
      renderizar();
    });

    // Init
    montarGradeIcones('📦');
    montarGradeCores('#16a34a');
    renderizar();
  </script>

</body>
</html>
