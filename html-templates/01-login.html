<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — FinançasPessoais</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%); min-height: 100vh; }
    .card-login { max-width: 420px; border: none; border-top: 5px solid #16a34a; border-radius: 12px; }
    .btn-entrar { background: #16a34a; border: none; padding: .65rem; font-weight: 600; }
    .btn-entrar:hover { background: #15803d; }
    .logo { font-size: 2rem; }
  </style>
</head>
<body class="d-flex flex-column align-items-center justify-content-center min-vh-100 p-3">

  <!-- CARD DE LOGIN -->
  <div class="card card-login shadow-lg w-100 mx-auto p-2">
    <div class="card-body p-4">

      <!-- Cabeçalho -->
      <div class="text-center mb-4">
        <div class="logo">💰</div>
        <h1 class="fs-4 fw-bold text-success mt-1 mb-0">FinançasPessoais</h1>
        <p class="text-muted small">Faça login para acessar sua conta</p>
      </div>

      <!-- ✅ FORMULÁRIO HTML DE LOGIN -->
      <form action="#" method="post">

        <!-- Campo: E-mail -->
        <div class="mb-3">
          <label for="email" class="form-label fw-semibold">E-mail</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-control"
            placeholder="seu@email.com"
            value="admin@financas.com"
            required
          />
        </div>

        <!-- Campo: Senha -->
        <div class="mb-4">
          <label for="senha" class="form-label fw-semibold">Senha</label>
          <input
            type="password"
            id="senha"
            name="senha"
            class="form-control"
            placeholder="••••••••"
            required
            minlength="4"
          />
        </div>

        <!-- Botão de Submit -->
        <button type="submit" class="btn btn-entrar btn-success w-100">
          Entrar no sistema
        </button>

      </form>
      <!-- /FORMULÁRIO -->

    </div>
  </div>

  <!-- Rodapé Bootstrap -->
  <footer class="mt-4 py-3 bg-dark text-white text-center w-100" style="position:fixed;bottom:0">
    <div class="container d-flex flex-sm-row flex-column justify-content-center align-items-center gap-2">
      <span>© 2024 FinançasPessoais</span>
      <span class="badge bg-success">Bootstrap 5</span>
      <span class="badge bg-secondary">HTML5</span>
      <span class="badge bg-info text-dark">CSS3</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
