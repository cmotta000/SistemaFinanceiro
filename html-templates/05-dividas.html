<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Template 05 — Dívidas e Parcelamentos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body { background-color: #f8fafc; }
    .card-divida { border-left: 4px solid #dc2626; }
    .preview-parcela { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; }
  </style>
</head>
<body class="p-4">

  <div class="container-xl">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 class="fs-4 fw-bold mb-0">💳 Dívidas e Parcelamentos</h1>
      <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#modalDivida" onclick="abrirNova()">
        + Nova Dívida
      </button>
    </div>

    <!-- READ -->
    <div class="row g-3" id="listaDividas"></div>
  </div>

  <!-- MODAL — Criar / Editar Dívida -->
  <div class="modal fade" id="modalDivida" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="tituloModal">Nova Dívida</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <!-- FORMULÁRIO com cálculo em tempo real -->
        <form id="formDivida" novalidate>
          <div class="modal-body">

            <!-- Nome da dívida -->
            <div class="mb-3">
              <label for="nome" class="form-label fw-semibold">Nome da Dívida <span class="text-danger">*</span></label>
              <input type="text" id="nome" class="form-control" placeholder="Ex: Financiamento TV" required />
            </div>

            <!-- Valor Total -->
            <div class="mb-3">
              <label for="valorTotal" class="form-label fw-semibold">Valor Total (R$) <span class="text-danger">*</span></label>
              <input type="number" id="valorTotal" class="form-control" placeholder="0,00" min="0.01" step="0.01"
                oninput="atualizarPreview()" required />
            </div>

            <!-- Quantidade de Parcelas -->
            <div class="mb-3">
              <label for="parcelas" class="form-label fw-semibold">Número de Parcelas <span class="text-danger">*</span></label>
              <input type="number" id="parcelas" class="form-control" placeholder="Ex: 12" min="1" max="360"
                oninput="atualizarPreview()" required />
            </div>

            <!-- Preview do valor da parcela (calculado em tempo real) -->
            <div class="preview-parcela p-3 mb-3" id="previewParcela" style="display:none">
              <span class="text-muted small">Valor de cada parcela:</span>
              <strong class="fs-5 text-success d-block" id="valorParcela">R$ 0,00</strong>
            </div>

            <!-- Data da Compra -->
            <div class="mb-3">
              <label for="dataCompra" class="form-label fw-semibold">Data da Compra <span class="text-danger">*</span></label>
              <input type="date" id="dataCompra" class="form-control" required />
            </div>

            <!-- Categoria -->
            <div class="mb-3">
              <label for="categoria" class="form-label fw-semibold">Categoria</label>
              <select id="categoria" class="form-select">
                <option value="">Selecione...</option>
                <option value="Eletrônicos">📱 Eletrônicos</option>
                <option value="Veículos">🚗 Veículos</option>
                <option value="Moradia">🏠 Moradia</option>
                <option value="Saúde">💊 Saúde</option>
                <option value="Outros">📦 Outros</option>
              </select>
            </div>

            <!-- Campo extra no modo edição: Parcelas já pagas -->
            <div class="mb-3" id="campoParclasPagas" style="display:none">
              <label for="parcelasPagas" class="form-label fw-semibold">Parcelas Já Pagas</label>
              <input type="number" id="parcelasPagas" class="form-control" min="0" />
            </div>

          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-success" id="btnSalvar">Adicionar</button>
          </div>
        </form>

      </div>
    </div>
  </div>

  <!-- MODAL — Projeção de Parcelas -->
  <div class="modal fade" id="modalProjecao" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">📅 Projeção de Parcelas</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="corpoProjecao"></div>
      </div>
    </div>
  </div>

  <!-- MODAL — Confirmação de Exclusão -->
  <div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title text-danger">Excluir Dívida</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Tem certeza que deseja excluir esta dívida?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" class="btn btn-danger" id="btnConfirmarExcluir">Excluir</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let dividas = [
      { id: 1, nome: 'Notebook Dell', valorTotal: 4800, parcelas: 12, parcelasPagas: 3, dataCompra: '2025-03-15', categoria: 'Eletrônicos' },
      { id: 2, nome: 'Financiamento Moto', valorTotal: 15000, parcelas: 36, parcelasPagas: 10, dataCompra: '2024-08-01', categoria: 'Veículos' },
    ];
    let proximoId = 3;
    let editandoId = null;
    let excluindoId = null;

    // Cálculo em tempo real do valor da parcela
    function atualizarPreview() {
      const total = parseFloat(document.getElementById('valorTotal').value);
      const qtd = parseInt(document.getElementById('parcelas').value);
      const preview = document.getElementById('previewParcela');
      const span = document.getElementById('valorParcela');
      if (total > 0 && qtd > 0) {
        span.textContent = 'R$ ' + (total / qtd).toFixed(2);
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    }

    // Gera projeção de datas das parcelas
    function gerarProjecao(divida) {
      const linhas = [];
      const base = new Date(divida.dataCompra + 'T00:00:00');
      const valorParcela = divida.valorTotal / divida.parcelas;
      for (let i = 1; i <= divida.parcelas; i++) {
        const data = new Date(base);
        data.setMonth(data.getMonth() + i);
        const paga = i <= divida.parcelasPagas;
        linhas.push(`
          <tr class="${paga ? 'table-success' : ''}">
            <td>${i}ª parcela</td>
            <td>${data.toLocaleDateString('pt-BR')}</td>
            <td>R$ ${valorParcela.toFixed(2)}</td>
            <td>${paga ? '<span class="badge bg-success">Paga</span>' : '<span class="badge bg-secondary">Pendente</span>'}</td>
          </tr>
        `);
      }
      return linhas.join('');
    }

    function renderizar() {
      document.getElementById('listaDividas').innerHTML = dividas.map(d => {
        const valorParcela = d.valorTotal / d.parcelas;
        const restantes = d.parcelas - d.parcelasPagas;
        const pct = Math.round((d.parcelasPagas / d.parcelas) * 100);
        return `
          <div class="col-md-6">
            <div class="card card-divida h-100">
              <div class="card-body">
                <div class="d-flex justify-content-between align-items-start mb-2">
                  <div>
                    <h6 class="fw-bold mb-0">${d.nome}</h6>
                    <small class="text-muted">${d.categoria}</small>
                  </div>
                  <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-warning" onclick="abrirEditar(${d.id})">✏️</button>
                    <button class="btn btn-sm btn-danger" onclick="confirmarExcluir(${d.id})">🗑️</button>
                  </div>
                </div>
                <p class="mb-1">Parcela: <strong class="text-danger">R$ ${valorParcela.toFixed(2)}</strong>/mês</p>
                <p class="mb-2 small text-muted">${d.parcelasPagas}/${d.parcelas} pagas · ${restantes} restantes</p>
                <div class="progress mb-3" style="height:8px">
                  <div class="progress-bar bg-success" style="width:${pct}%"></div>
                </div>
                <div class="d-flex gap-2">
                  <button class="btn btn-sm btn-outline-success" onclick="pagarParcela(${d.id})">✅ Pagar Parcela</button>
                  <button class="btn btn-sm btn-outline-secondary" onclick="verProjecao(${d.id})">📅 Ver Projeção</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('') || '<p class="text-muted">Nenhuma dívida cadastrada.</p>';
    }

    function abrirNova() {
      editandoId = null;
      document.getElementById('tituloModal').textContent = 'Nova Dívida';
      document.getElementById('btnSalvar').textContent = 'Adicionar';
      document.getElementById('formDivida').reset();
      document.getElementById('previewParcela').style.display = 'none';
      document.getElementById('campoParclasPagas').style.display = 'none';
      document.getElementById('dataCompra').value = new Date().toISOString().split('T')[0];
    }

    function abrirEditar(id) {
      editandoId = id;
      const d = dividas.find(x => x.id === id);
      document.getElementById('tituloModal').textContent = 'Editar Dívida';
      document.getElementById('btnSalvar').textContent = 'Salvar Alterações';
      document.getElementById('nome').value = d.nome;
      document.getElementById('valorTotal').value = d.valorTotal;
      document.getElementById('parcelas').value = d.parcelas;
      document.getElementById('dataCompra').value = d.dataCompra;
      document.getElementById('categoria').value = d.categoria;
      document.getElementById('parcelasPagas').value = d.parcelasPagas;
      document.getElementById('campoParclasPagas').style.display = 'block';
      atualizarPreview();
      new bootstrap.Modal(document.getElementById('modalDivida')).show();
    }

    document.getElementById('formDivida').addEventListener('submit', function (e) {
      e.preventDefault();
      const dados = {
        nome: document.getElementById('nome').value.trim(),
        valorTotal: parseFloat(document.getElementById('valorTotal').value),
        parcelas: parseInt(document.getElementById('parcelas').value),
        dataCompra: document.getElementById('dataCompra').value,
        categoria: document.getElementById('categoria').value,
        parcelasPagas: parseInt(document.getElementById('parcelasPagas').value) || 0,
      };
      if (!dados.nome || !dados.valorTotal || !dados.parcelas) return;

      if (editandoId === null) {
        dividas.push({ id: proximoId++, ...dados, parcelasPagas: 0 });
      } else {
        const idx = dividas.findIndex(d => d.id === editandoId);
        dividas[idx] = { id: editandoId, ...dados };
      }
      bootstrap.Modal.getInstance(document.getElementById('modalDivida')).hide();
      renderizar();
    });

    function pagarParcela(id) {
      const d = dividas.find(x => x.id === id);
      if (d.parcelasPagas < d.parcelas) {
        d.parcelasPagas++;
        renderizar();
      }
    }

    function verProjecao(id) {
      const d = dividas.find(x => x.id === id);
      document.getElementById('corpoProjecao').innerHTML = `
        <h6 class="fw-bold mb-3">${d.nome} — ${d.parcelas}x de R$ ${(d.valorTotal / d.parcelas).toFixed(2)}</h6>
        <table class="table table-sm table-bordered">
          <thead class="table-light"><tr><th>Parcela</th><th>Vencimento</th><th>Valor</th><th>Status</th></tr></thead>
          <tbody>${gerarProjecao(d)}</tbody>
        </table>
      `;
      new bootstrap.Modal(document.getElementById('modalProjecao')).show();
    }

    function confirmarExcluir(id) {
      excluindoId = id;
      new bootstrap.Modal(document.getElementById('modalExcluir')).show();
    }

    document.getElementById('btnConfirmarExcluir').addEventListener('click', function () {
      dividas = dividas.filter(d => d.id !== excluindoId);
      bootstrap.Modal.getInstance(document.getElementById('modalExcluir')).hide();
      renderizar();
    });

    renderizar();
  </script>

</body>
</html>
